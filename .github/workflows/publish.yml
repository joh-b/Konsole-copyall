name: Build and publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect binary-cache configuration
        id: cache
        env:
          CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
          AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [[ -n "$CACHE_NAME" && -n "$AUTH_TOKEN" ]]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo '::warning::Cachix publication is disabled. Configure CACHIX_CACHE_NAME and CACHIX_AUTH_TOKEN.'
          fi

      - name: Configure Cachix
        if: steps.cache.outputs.enabled == 'true'
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check and build
        run: nix flake check --print-build-logs

      - name: Build the default package explicitly
        run: nix build .#default --print-build-logs

      - name: Record build metadata
        run: |
          result_path=$(readlink -f result)
          nixpkgs_revision=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          konsole_version=$(nix eval --raw .#packages.x86_64-linux.default.version)
          {
            echo '## Patched Konsole build'
            echo
            echo "- Repository commit: $GITHUB_SHA"
            echo "- nixpkgs revision: $nixpkgs_revision"
            echo "- Konsole version: $konsole_version"
            echo '- Nix system: x86_64-linux'
            echo "- Store path: $result_path"
            echo "- Cachix publication enabled: ${{ steps.cache.outputs.enabled }}"
          } | tee build-metadata.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata
        uses: actions/upload-artifact@v6
        with:
          name: build-metadata
          path: build-metadata.md
          if-no-files-found: error
          retention-days: 30
